name: Mobile Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing tag to publish
        required: true
        type: string
  push:
    tags:
      - "mobile-v*"

permissions:
  contents: write

jobs:
  publish-github-release:
    name: Publish GitHub Release from Tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout selected tag (manual)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != ''
        shell: bash
        run: |
          git fetch --tags --force
          git checkout "refs/tags/${{ github.event.inputs.release_tag }}"

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
            echo "latest_tag=mobile-latest" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "latest_tag=mobile-latest" >> "$GITHUB_OUTPUT"
          else
            echo "tag=mobile-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            echo "latest_tag=mobile-latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release (versioned)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: EduMart Mobile ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          body: |
            Release created from tag `${{ steps.meta.outputs.tag }}`.
            Commit: `${{ github.sha }}`

      - name: Create/Update GitHub Release (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.latest_tag }}
          name: EduMart Mobile Latest
          target_commitish: ${{ github.sha }}
          prerelease: false
          make_latest: true
          generate_release_notes: false
          body: |
            Auto-updated release pointer.
            Source tag: `${{ steps.meta.outputs.tag }}`.
            Commit: `${{ github.sha }}`

