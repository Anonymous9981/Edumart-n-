name: Mobile Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Git tag to publish as a release
        required: true
        type: string
  push:
    tags:
      - 'mobile-v*'

permissions:
  contents: write

env:
  ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
  ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
  ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}

jobs:
  build-android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prebuild Android project
        working-directory: apps/mobile
        run: pnpm exec expo prebuild --platform android --clean --non-interactive

      - name: Decode keystore
        if: secrets.ANDROID_KEYSTORE != null
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > "apps/mobile/android/app/karom-edumart-release.keystore"

      - name: Create signing properties
        if: secrets.ANDROID_KEYSTORE != null
        run: |
          cat > "apps/mobile/android/signing.properties" << EOF
          KEYSTORE_FILE=app/karom-edumart-release.keystore
          KEYSTORE_PASSWORD=${{ env.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS=${{ env.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD=${{ env.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build Android release APK
        working-directory: apps/mobile/android
        run: |
          if [ -f "signing.properties" ]; then
            ./gradlew assembleRelease
          else
            echo "WARNING: Keystore not configured in GitHub Secrets. Building debug APK instead."
            echo "To enable signed release builds, follow the setup in the workflow comments."
            ./gradlew assembleDebug
          fi
        shell: bash

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Rename APK for release
        shell: bash
        run: |
          mkdir -p release
          if [ -f "apps/mobile/android/app/build/outputs/apk/release/app-release.apk" ]; then
            cp "apps/mobile/android/app/build/outputs/apk/release/app-release.apk" "release/Karom-EduMart-${{ steps.meta.outputs.tag }}.apk"
          elif [ -f "apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            cp "apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk" "release/Karom-EduMart-${{ steps.meta.outputs.tag }}.apk"
          else
            echo "ERROR: No APK file found"
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Karom-EduMart-${{ steps.meta.outputs.tag }}
          path: release/Karom-EduMart-${{ steps.meta.outputs.tag }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: EduMart Mobile ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: release/Karom-EduMart-${{ steps.meta.outputs.tag }}.apk