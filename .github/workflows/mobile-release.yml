name: Mobile Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing tag to publish
        required: true
        type: string
  push:
    tags:
      - "mobile-v*"

permissions:
  contents: write

jobs:
  build-android-apk:
    name: Build Android APK (EAS Cloud)
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout selected tag (manual)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != ''
        shell: bash
        run: |
          git fetch --tags --force
          git checkout "refs/tags/${{ github.event.inputs.release_tag }}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate required secrets
        shell: bash
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "EXPO_TOKEN is missing. Add it in repository secrets before running this workflow."
            exit 1
          fi

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build APK on EAS Cloud
        id: eas
        working-directory: apps/mobile
        shell: bash
        run: |
          npx eas-cli build --platform android --profile preview --non-interactive --wait --json > eas-build.json
          node <<'NODE'
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('eas-build.json', 'utf8'));
          const build = Array.isArray(data) ? data[0] : data;
          const url = build?.artifacts?.buildUrl || '';
          if (!url) {
            console.error('No EAS artifact URL found in eas-build.json');
            process.exit(1);
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `apk_url=${url}\n`);
          NODE

      - name: Download APK artifact
        shell: bash
        run: |
          mkdir -p release
          curl -fL "${{ steps.eas.outputs.apk_url }}" -o "release/Karom-EduMart-${{ steps.meta.outputs.tag }}.apk"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Karom-EduMart-${{ steps.meta.outputs.tag }}
          path: release/Karom-EduMart-${{ steps.meta.outputs.tag }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: EduMart Mobile ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: release/Karom-EduMart-${{ steps.meta.outputs.tag }}.apk
