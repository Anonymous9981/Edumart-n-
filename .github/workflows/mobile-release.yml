name: Mobile Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Git tag to publish as a release
        required: true
        type: string
  push:
    tags:
      - 'mobile-v*'

permissions:
  contents: write

jobs:
  build-android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prebuild Android project
        working-directory: apps/mobile
        run: pnpm exec expo prebuild --platform android --clean --non-interactive

      - name: Build Android debug APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: EduMart Mobile ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk